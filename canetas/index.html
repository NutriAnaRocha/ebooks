<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia Completo para Pacientes em Uso de Canetas Emagrecedoras — Ana Luisa Rocha</title>
<style>
/* ============ FONTES DA MARCA ============ */
@font-face{font-family:"Merienda";src:url("fonts/Merienda-VariableFont_wght.ttf") format("truetype");font-weight:300 900;font-display:swap}
@font-face{font-family:"Montserrat";src:url("fonts/Montserrat-Regular.ttf") format("truetype");font-weight:400;font-display:swap}
@font-face{font-family:"Montserrat";src:url("fonts/Montserrat-Medium.ttf") format("truetype");font-weight:500;font-display:swap}
@font-face{font-family:"Montserrat";src:url("fonts/Montserrat-SemiBold.ttf") format("truetype");font-weight:600;font-display:swap}
@font-face{font-family:"Montserrat";src:url("fonts/Montserrat-Bold.ttf") format("truetype");font-weight:700;font-display:swap}

/* ============ TOKENS — Identidade Ana Luisa Rocha ============ */
:root{
  --vinho:#7B284C; --vinho-2:#9C3D63; --vinho-soft:#9C3D63; --vinho-escuro:#5E1D3A;
  --rosa:#F4DCE5; --rosa-2:#FBEEF3; --rosa-3:#FDF7FA;
  --grafite:#3C3C3C; --cinza:#8A8A8A; --cinza-c:#F5F5F5;
  --branco:#fff; --ouro:#9C3D63; --ouro-2:#c98aa6;
  --linha:#E7E7EA; --ok:#3f7d6b; --alerta:#b7791f;
  --serif:"Merienda","Georgia",serif;
  --sans:"Montserrat","Segoe UI",system-ui,-apple-system,sans-serif;
  --r:20px; --sh:0 24px 60px rgba(123,40,76,.12),0 10px 24px rgba(60,60,60,.10);
  --sh-sm:0 4px 12px rgba(60,60,60,.06),0 12px 28px rgba(123,40,76,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);color:var(--grafite);line-height:1.65;-webkit-font-smoothing:antialiased;
  background:
    radial-gradient(1200px 600px at 80% -10%, var(--rosa-2), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, var(--rosa-2), transparent 55%),
    var(--cinza-c);
  min-height:100vh}
img{max-width:100%}
a{color:var(--vinho)}

/* ============ PROGRESS BAR ============ */
#topbar{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(123,40,76,.12);z-index:80}
#topbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--vinho),var(--vinho-2));transition:width .4s ease}

/* ============ READER / LIVRO ============ */
#reader{max-width:880px;margin:0 auto;padding:54px 24px 130px}
.book{position:relative;background:var(--branco);border-radius:var(--r);box-shadow:var(--sh);
  padding:0;overflow:hidden;border:1px solid rgba(123,40,76,.06)}
/* lombada decorativa à esquerda */
.book::before{content:"";position:absolute;left:0;top:0;bottom:0;width:7px;
  background:linear-gradient(180deg,var(--vinho),var(--vinho-escuro));z-index:5}
.runhead{display:flex;align-items:center;gap:12px;padding:18px 40px;border-bottom:1px solid var(--linha);
  background:linear-gradient(180deg,var(--rosa-3),#fff)}
.runhead img{height:26px;width:auto}
.runhead .ch{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--vinho-soft);font-weight:600}
.runhead .pg{margin-left:auto;font-family:var(--serif);font-size:13px;color:var(--cinza)}
.runhead.hide{display:none}
#main{padding:46px 56px 54px}
.page{display:none}
.page.show{display:block;animation:turn .5s cubic-bezier(.22,.61,.36,1)}
@keyframes turn{from{opacity:0;transform:translateX(26px) rotateY(2deg)}to{opacity:1;transform:none}}

/* ============ SETAS LATERAIS (virar página) ============ */
.arrow{position:fixed;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%;
  background:#fff;border:1px solid var(--linha);box-shadow:var(--sh-sm);cursor:pointer;z-index:70;
  display:flex;align-items:center;justify-content:center;color:var(--vinho);font-size:24px;transition:.18s;font-family:var(--serif)}
.arrow:hover{background:var(--vinho);color:#fff;border-color:var(--vinho)}
.arrow.left{left:max(16px,calc(50% - 520px))}
.arrow.right{right:max(16px,calc(50% - 520px))}
.arrow[disabled]{opacity:.3;pointer-events:none}

/* ============ BARRA INFERIOR ============ */
.botbar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:70;
  display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--linha);
  box-shadow:var(--sh);border-radius:999px;padding:7px 8px}
.botbar button{border:none;background:transparent;font-family:var(--sans);font-weight:600;font-size:13px;
  color:var(--vinho);cursor:pointer;padding:9px 16px;border-radius:999px;display:flex;align-items:center;gap:7px}
.botbar button:hover{background:var(--rosa-2)}
.botbar .sep{width:1px;height:22px;background:var(--linha)}
.botbar .count{font-family:var(--serif);font-size:13px;color:var(--cinza);padding:0 12px;white-space:nowrap}
.botbar .nav-mini{display:none}

/* ============ SUMÁRIO (overlay) ============ */
#toc{position:fixed;inset:0;z-index:90;background:rgba(94,29,58,.55);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;padding:24px}
#toc.open{display:flex;animation:fade .25s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.toc-card{background:#fff;border-radius:24px;max-width:560px;width:100%;max-height:86vh;overflow:auto;
  box-shadow:var(--sh);padding:34px 34px 26px;position:relative}
.toc-card .x{position:absolute;top:18px;right:20px;border:none;background:var(--rosa-2);width:38px;height:38px;
  border-radius:50%;cursor:pointer;color:var(--vinho);font-size:18px}
.toc-card h3{font-family:var(--serif);color:var(--vinho);font-size:24px;margin-bottom:4px;font-weight:900}
.toc-card .sub{color:var(--cinza);font-size:13px;margin-bottom:18px}
.toc-list a{display:flex;align-items:center;gap:14px;padding:13px 14px;border-radius:14px;text-decoration:none;
  color:var(--grafite);border:1px solid transparent;transition:.15s}
.toc-list a:hover{background:var(--rosa-3);border-color:var(--linha)}
.toc-list a.active{background:linear-gradient(135deg,var(--vinho),var(--vinho-2));color:#fff}
.toc-list a .ix{width:38px;height:38px;border-radius:11px;background:var(--rosa-2);color:var(--vinho);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.toc-list a.active .ix{background:rgba(255,255,255,.18);color:#fff}
.toc-list a b{font-family:var(--serif);font-size:16px;font-weight:900;display:block}
.toc-list a small{display:block;font-size:11.5px;color:var(--cinza);font-weight:500}
.toc-list a.active small{color:var(--rosa)}
.toc-list a .dn{margin-left:auto;color:var(--ok);font-weight:700;font-size:13px;opacity:0}
.toc-list a.done .dn{opacity:1}
.toc-list a.active.done .dn{color:#fff}
.toc-list .num{font-family:var(--serif);font-size:13px;color:var(--ouro-2);width:18px;text-align:center;flex:0 0 auto}

/* ============ TIPOGRAFIA / CONTEÚDO ============ */
.eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--vinho-soft);font-weight:600;margin-bottom:10px}
h1{font-family:var(--serif);font-size:38px;line-height:1.15;color:var(--vinho);margin-bottom:14px;font-weight:900}
h2{font-family:var(--serif);font-size:25px;color:var(--vinho);margin:34px 0 14px;font-weight:900}
h3{font-family:var(--serif);font-size:19px;color:var(--grafite);margin:24px 0 10px;font-weight:900}
p{margin-bottom:14px;color:#5a5557;font-size:15.5px}
.lead{font-size:17px;color:var(--grafite)}
ul,ol{margin:0 0 16px 22px;color:#5a5557}
li{margin-bottom:7px}
strong{color:var(--grafite);font-weight:600}

.card{background:#fff;border:1px solid var(--linha);border-radius:var(--r);padding:24px 26px;box-shadow:var(--sh-sm);margin:18px 0}
.grid{display:grid;gap:16px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}
.icard{background:#fff;border:1px solid var(--linha);border-radius:16px;padding:20px;box-shadow:var(--sh-sm)}
.icard .ic{width:42px;height:42px;border-radius:12px;background:var(--rosa-2);color:var(--vinho);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.icard h4{font-family:var(--serif);color:var(--vinho);font-size:17px;margin-bottom:6px;font-weight:900}
.icard p{font-size:14px;margin:0}
.tip{display:flex;gap:14px;background:linear-gradient(135deg,var(--rosa-3),#fff);border:1px solid var(--rosa);
  border-left:4px solid var(--vinho);border-radius:14px;padding:16px 18px;margin:18px 0}
.tip .ic{color:var(--vinho);flex:0 0 auto}.tip b{color:var(--vinho)}
.tip p{margin:0;font-size:14.5px;color:var(--grafite)}
.warn{border-color:#f0d9c2;border-left-color:var(--alerta);background:linear-gradient(135deg,#fdf6ee,#fff)}
.warn .ic{color:var(--alerta)}
.disc{font-size:12.5px;color:var(--cinza);background:var(--cinza-c);border:1px dashed var(--linha);border-radius:12px;padding:14px 16px;margin:18px 0}

table{width:100%;border-collapse:collapse;margin:16px 0;background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--sh-sm)}
th,td{padding:13px 15px;text-align:left;font-size:14px;vertical-align:top;border-bottom:1px solid var(--linha)}
th{background:var(--vinho);color:#fff;font-weight:600;font-size:12.5px}
tr:last-child td{border-bottom:none}tr:nth-child(even) td{background:var(--rosa-3)}

.check{list-style:none;margin:14px 0;padding:0}
.check li{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:#fff;border:1px solid var(--linha);
  border-radius:12px;margin-bottom:9px;cursor:pointer;transition:.15s;font-size:14.5px;color:var(--grafite)}
.check li:hover{border-color:var(--vinho-soft)}
.check li .box{width:22px;height:22px;border:2px solid var(--vinho-soft);border-radius:7px;flex:0 0 auto;margin-top:1px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;transition:.15s}
.check li.on{background:var(--rosa-3);border-color:var(--vinho)}
.check li.on .box{background:var(--vinho);border-color:var(--vinho)}
.check li.on span{text-decoration:line-through;color:var(--cinza)}

label.fld{display:block;font-size:13px;font-weight:600;color:var(--vinho);margin:14px 0 6px}
input.f,textarea.f,select.f{width:100%;border:1px solid var(--linha);border-radius:12px;padding:12px 14px;
  font-family:var(--sans);font-size:14.5px;color:var(--grafite);background:#fff;transition:.15s}
input.f:focus,textarea.f:focus,select.f:focus{outline:none;border-color:var(--vinho-soft);box-shadow:0 0 0 3px rgba(123,40,76,.18)}
textarea.f{min-height:90px;resize:vertical}
.saved-note{font-size:12px;color:var(--ok);opacity:0;transition:.3s}.saved-note.show{opacity:1}

.btn{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,var(--vinho),var(--vinho-2));
  color:#fff;border:none;padding:14px 26px;border-radius:13px;font-size:14.5px;font-weight:600;cursor:pointer;
  font-family:var(--sans);box-shadow:var(--sh-sm);transition:.18s;text-decoration:none}
.btn:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.btn.ghost{background:#fff;color:var(--vinho);border:1px solid var(--linha)}
.pager{display:flex;justify-content:space-between;gap:14px;margin-top:46px;border-top:1px solid var(--linha);padding-top:26px}

.quiz .q{background:#fff;border:1px solid var(--linha);border-radius:16px;padding:20px 22px;margin-bottom:16px;box-shadow:var(--sh-sm)}
.quiz .q p.qt{font-weight:600;color:var(--grafite);font-size:15.5px;margin-bottom:14px}
.quiz .opts{display:flex;gap:12px}
.quiz .opt{flex:1;border:1.5px solid var(--linha);border-radius:11px;padding:12px;text-align:center;cursor:pointer;font-weight:600;color:var(--cinza);transition:.15s;background:#fff}
.quiz .opt:hover{border-color:var(--vinho-soft)}
.quiz .opt.sel{border-color:var(--vinho);background:var(--rosa-3);color:var(--vinho)}
.quiz .fb{margin-top:13px;font-size:13.5px;padding:11px 14px;border-radius:10px;display:none}
.quiz .fb.show{display:block}.quiz .fb.ok{background:#e8f3ef;color:var(--ok)}.quiz .fb.no{background:#fbeaea;color:#a23b3b}
.quiz-score{font-family:var(--serif);font-size:20px;color:var(--vinho);text-align:center;padding:18px;background:var(--rosa-2);border-radius:14px;margin-top:10px;display:none}
.quiz-score.show{display:block}

.water-wrap{display:flex;gap:26px;flex-wrap:wrap;align-items:center}
.cups{display:flex;flex-wrap:wrap;gap:12px;max-width:520px}
.cup{width:46px;height:58px;cursor:pointer;transition:.15s;color:var(--linha)}
.cup:hover{transform:translateY(-3px)}
.water-meta{flex:1;min-width:200px}
.water-meta .big{font-family:var(--serif);font-size:38px;color:var(--vinho)}
.calc{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-top:8px}.calc .fld{margin:0}

.rfilter{display:flex;gap:9px;flex-wrap:wrap;margin:18px 0 22px}
.chip{border:1.5px solid var(--linha);background:#fff;color:var(--cinza);padding:9px 16px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--vinho-soft)}.chip.on{background:var(--vinho);color:#fff;border-color:var(--vinho)}
.recipes{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.recipe{background:#fff;border:1px solid var(--linha);border-radius:16px;overflow:hidden;box-shadow:var(--sh-sm);display:flex;flex-direction:column}
.recipe .rh{padding:16px 18px;background:linear-gradient(135deg,var(--rosa-3),#fff);border-bottom:1px solid var(--linha)}
.recipe .rh .tag{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--vinho-soft);font-weight:700}
.recipe .rh h4{font-family:var(--serif);color:var(--vinho);font-size:17px;margin:5px 0 0;font-weight:900}
.recipe .prot{display:inline-flex;align-items:center;gap:6px;background:var(--vinho);color:#fff;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:20px;margin-top:9px}
.recipe .rb{padding:16px 18px;font-size:13.5px}
.recipe .rb h5{font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--vinho-soft);margin:10px 0 5px;font-weight:700}
.recipe .rb ul{margin:0 0 0 18px;color:var(--cinza)}.recipe .rb p{font-size:13.5px;margin:0;color:var(--cinza)}

/* ============ CAPA DO LIVRO ============ */
.cover{position:relative;text-align:center;padding:30px 30px 8px}
.cover .frame{border:1.5px solid var(--rosa);border-radius:16px;padding:46px 34px 40px;
  background:linear-gradient(180deg,#fff,var(--rosa-3));position:relative;overflow:hidden}
.cover .frame::before{content:"";position:absolute;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,var(--rosa-2),transparent 70%);top:-130px;right:-90px}
.cover .logo{height:54px;width:auto;margin-bottom:6px;position:relative}
.cover .ce{font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--vinho-soft);font-weight:600;margin:18px 0 12px;position:relative}
.cover h1{color:var(--vinho);font-size:36px;line-height:1.12;margin:0 auto 16px;max-width:560px;position:relative}
.cover .rule{width:70px;height:3px;background:var(--vinho);margin:0 auto 18px;border-radius:3px;position:relative}
.cover p.sub{color:#5a5557;font-size:16px;max-width:480px;margin:0 auto 26px;position:relative}
.cover .seal{display:inline-flex;gap:9px;align-items:center;background:var(--rosa-2);color:var(--vinho);
  border:1px solid var(--rosa);padding:8px 16px;border-radius:30px;font-size:12.5px;font-weight:600;position:relative}
.cover .cta{margin-top:26px;position:relative}
.stat{display:flex;gap:14px;flex-wrap:wrap;margin:26px 0 6px}
.stat .s{flex:1;min-width:120px;background:#fff;border:1px solid var(--linha);border-radius:14px;padding:16px;text-align:center;box-shadow:var(--sh-sm)}
.stat .s b{display:block;font-family:var(--serif);font-size:28px;color:var(--vinho)}
.stat .s span{font-size:12.5px;color:var(--cinza)}

.footer{margin-top:54px;padding-top:24px;border-top:1px solid var(--linha);font-size:12px;color:var(--cinza)}
.footer img{height:22px;margin-bottom:10px}

/* ============ RESPONSIVO ============ */
@media(max-width:920px){
  .arrow{display:none}
  #reader{padding:34px 12px 110px}
  #main{padding:30px 22px 40px}
  .runhead{padding:14px 22px}
  h1{font-size:30px}.cover h1{font-size:28px}
  .g2,.g3,.recipes{grid-template-columns:1fr}
  .quiz .opts{flex-direction:column}
  .botbar .nav-mini{display:flex}
  #main{overflow-x:hidden}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  table thead,table tbody{display:table;width:100%;min-width:520px}
}
@media print{
  #topbar,.arrow,.botbar,#toc,.runhead,.pager,.btn{display:none!important}
  body{background:#fff}.book{box-shadow:none;border:none}.book::before{display:none}
  #reader{padding:0;max-width:100%}.page{display:block!important;page-break-after:always}
  #main{padding:0}
}
</style>
</head>
<body>
<div id="topbar"><i></i></div>

<button class="arrow left" id="prevBtn" aria-label="Página anterior">‹</button>
<button class="arrow right" id="nextBtn" aria-label="Próxima página">›</button>

<div id="reader">
  <div class="book" id="book">
    <header class="runhead" id="runhead">
      <img src="img/logo-ana-full.png" alt="Ana Luisa Rocha — Nutricionista">
      <span class="ch" id="chLabel"></span>
      <span class="pg" id="pgLabel"></span>
    </header>
    <main id="main"></main>
  </div>
</div>

<div class="botbar">
  <button id="prevMini" class="nav-mini" aria-label="Anterior">‹</button>
  <button id="tocOpen">☰ Sumário</button>
  <span class="sep"></span>
  <span class="count" id="counter"></span>
  <button id="nextMini" class="nav-mini" aria-label="Próximo">›</button>
</div>

<!-- SUMÁRIO -->
<div id="toc">
  <div class="toc-card">
    <button class="x" id="tocClose">✕</button>
    <h3>Sumário</h3>
    <div class="sub">Guia Completo para Pacientes em Uso de Canetas Emagrecedoras</div>
    <nav class="toc-list" id="tocList"></nav>
  </div>
</div>

<script>
/* =================== ICONS =================== */
const I=(p,e="")=>`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" ${e}>${p}</svg>`;
const ICON={
  home:I('<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/>'),
  pill:I('<rect x="3" y="8" width="18" height="8" rx="4"/><path d="M12 8v8"/>'),
  fork:I('<path d="M6 3v7a2 2 0 002 2v9"/><path d="M10 3v7"/><path d="M14 3c0 4 1 5 3 5v13"/>'),
  drop:I('<path d="M12 3s6 6 6 11a6 6 0 01-12 0c0-5 6-11 6-11z"/>'),
  shield:I('<path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3z"/>'),
  muscle:I('<path d="M5 12c2-3 5-3 7 0M3 18c1-2 3-3 5-3M19 8a3 3 0 11-4 3l-3 5"/>'),
  heart:I('<path d="M12 20s-7-4.5-9-9a4.5 4.5 0 019-1 4.5 4.5 0 019 1c-2 4.5-9 9-9 9z"/>'),
  chef:I('<path d="M6 14h12v5H6z"/><path d="M8 14a4 4 0 01-1-7.7A3.5 3.5 0 0112 4a3.5 3.5 0 015 2.3A4 4 0 0116 14"/>'),
  chart:I('<path d="M4 19V5M4 19h16M8 16v-4M12 16V8M16 16v-6"/>'),
  star:I('<path d="M12 3l2.6 5.3 5.8.8-4.2 4.1 1 5.8L12 16.8 6.8 19l1-5.8L3.6 9.1l5.8-.8L12 3z"/>'),
  book:I('<path d="M4 5a2 2 0 012-2h13v18H6a2 2 0 01-2-2V5z"/><path d="M19 17H6"/>'),
  warn:I('<path d="M12 3l9 16H3l9-16z"/><path d="M12 10v4M12 17.5v.5"/>'),
  scale:I('<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'),
  flame:I('<path d="M12 3c1 3-2 4-2 7a2 2 0 004 0c0-1 0-2 1-3 2 2 3 4 3 7a6 6 0 01-12 0c0-4 4-6 6-11z"/>'),
  cup:c=>`<svg class="cup ${c?'on':''}" viewBox="0 0 24 30" fill="${c?'#bfe0f0':'none'}" stroke="${c?'#5aa9d6':'#E7E7EA'}" stroke-width="1.6" stroke-linejoin="round"><path d="M4 4h16l-1.5 22a2 2 0 01-2 1.8H7.5a2 2 0 01-2-1.8L4 4z"/><path d="M4.6 11h14.8"/></svg>`
};

/* builders */
function checklist(items,key){return `<ul class="check" data-ck="${key}">`+items.map((t,i)=>`<li data-i="${i}"><span class="box"></span><span>${t}</span></li>`).join("")+`</ul>`;}
function field(label,key,type="text",ph=""){return type==="textarea"?`<label class="fld">${label}</label><textarea class="f" data-fld="${key}" placeholder="${ph}"></textarea>`:`<label class="fld">${label}</label><input class="f" type="${type}" data-fld="${key}" placeholder="${ph}">`;}
function pager(p,pt,n,nt){return `<div class="pager">${p?`<button class="btn ghost" onclick="go('${p}')">← ${pt}</button>`:`<span></span>`}${n?`<button class="btn" onclick="go('${n}')">${nt} →</button>`:`<span></span>`}</div>`;}

<tr><td><strong>Náusea</strong></td><td>Esvaziamento gástrico mais lento; refeições grandes ou gordurosas</td><td>Porções menores, comer devagar, evitar frituras; alimentos secos e frios costumam ajudar (torrada, gelatina)</td></tr>
<tr><td><strong>Constipação</strong></td><td>Menos comida, pouca água e fibra</td><td>Aumentar água, fibras (frutas, verduras, aveia) e movimento; conversar com o profissional se persistir</td></tr>
<tr><td><strong>Azia</strong></td><td>Refluxo do conteúdo gástrico</td><td>Evitar deitar após comer, reduzir gordura/café/cítricos, refeições menores</td></tr>
<tr><td><strong>Refluxo</strong></td><td>Estômago mais cheio por mais tempo</td><td>Última refeição ao menos 2–3 h antes de deitar; elevar a cabeceira</td></tr>
<tr><td><strong>Diarreia</strong></td><td>Adaptação intestinal; alimentos gordurosos</td><td>Hidratar bem, preferir alimentos leves e cozidos; repor líquidos</td></tr>
<tr><td><strong>Perda excessiva de apetite</strong></td><td>Efeito intenso sobre a saciedade</td><td>Priorizar proteína e densidade nutricional em pequenas porções; não pular refeições</td></tr>
</tbody></table>
<div class="tip warn">${ICON.warn}<div><b>Procure seu médico se:</b><p>vômitos persistentes, dor abdominal forte, sinais de desidratação, ou qualquer sintoma intenso e que não melhora. Este guia não substitui avaliação médica.</p></div></div>
<h2>Marque os sintomas que você sentiu</h2>
${checklist(["Náusea","Constipação","Azia","Refluxo","Diarreia","Perda de apetite acentuada"],"m4_check")}

${pager("m3","Módulo 3","m5","Módulo 5")}`;

<h1>Preservando a massa muscular</h1>
<p class="lead">Perder peso é o objetivo — perder músculo, não. Manter a massa magra protege seu metabolismo e ajuda a não recuperar o peso depois.</p>
<h2>A importância da proteína</h2>
<p>A proteína é o nutriente que sustenta seus músculos. Mesmo comendo menos, mantê-la alta é prioridade. Distribua ao longo do dia e comece sempre as refeições por ela.</p>
<div class="grid g2">

<div class="eyebrow">Módulo 6</div>
<h1>Saúde emocional</h1>
<p class="lead">Emagrecer mexe com a relação que temos com a comida e com o corpo. Cuidar do emocional é parte do tratamento — e merece o mesmo carinho.</p>
<h2>Fome emocional x fome física</h2>
<table><thead><tr><th>Fome física</th><th>Fome emocional</th></tr></thead><tbody>
<tr><td>Surge aos poucos</td><td>Aparece de repente</td></tr>
<tr><td>Qualquer alimento serve</td><td>Desejo por algo específico (doce, salgado)</td></tr>
<tr><td>Passa ao se alimentar</td><td>Continua mesmo depois de comer</td></tr>
<tr><td>Sem culpa depois</td><td>Costuma vir acompanhada de culpa</td></tr>

<h2>Comer emocional e ansiedade</h2>
<p>Usar a comida para acalmar emoções é humano e muito comum. O primeiro passo não é se cobrar — é <strong>perceber</strong>. Ao notar vontade de comer fora de hora, pergunte: "É fome ou é sentimento?"</p>
<div class="tip">${ICON.heart}<div><b>Pausa de 5 minutos:</b><p>Antes de comer por impulso, beba água e espere 5 minutos fazendo algo diferente. Muitas vezes a vontade passa.</p></div></div>
<h2>Construção de hábitos</h2>
<p>Hábitos saudáveis se constroem com repetição gentil, não com perfeição. Foque em uma pequena mudança por vez e celebre cada constância.</p>

/* =================== RENDER =================== */
const main=document.getElementById("main");
PAGES.forEach(p=>main.insertAdjacentHTML("beforeend",`<section class="page" id="page-${p.id}">${C[p.id]}</section>`));

/* sumário */
const tocList=document.getElementById("tocList");
PAGES.forEach((p,i)=>{
  const num=p.id.startsWith("m")?`<span class="num">${p.id.slice(1)}</span>`:`<span class="num">•</span>`;
  tocList.insertAdjacentHTML("beforeend",
   `<a href="#${p.id}" data-id="${p.id}">${num}<span class="ix">${p.ic}</span><span><b>${p.t}</b><small>${p.st}</small></span><span class="dn">✓</span></a>`);
});
tocList.querySelectorAll("a").forEach(a=>a.addEventListener("click",e=>{e.preventDefault();go(a.dataset.id);}));

/* =================== NAVEGAÇÃO =================== */
const idx=id=>PAGES.findIndex(p=>p.id===id);
function go(id){
  const i=idx(id); if(i<0)return;
  document.querySelectorAll(".page").forEach(s=>s.classList.remove("show"));
  const pg=document.getElementById("page-"+id); pg.classList.add("show");
  // running header
  const rh=document.getElementById("runhead");
  if(id==="capa"){rh.classList.add("hide");}
  else{rh.classList.remove("hide");
    document.getElementById("chLabel").textContent=PAGES[i].t;
    document.getElementById("pgLabel").textContent="Página "+(i+1)+" de "+PAGES.length;}
  document.getElementById("counter").textContent=(i+1)+" / "+PAGES.length;
  // arrows
  prevBtn.disabled=prevMini.disabled=(i===0);
  nextBtn.disabled=nextMini.disabled=(i===PAGES.length-1);
  set("last",id); markVisited(id); updateProgress(); updateToc(id);
  window.scrollTo({top:0,behavior:"instant"});
  closeToc();
}
function step(d){const i=idx(get("last","capa"))+d; if(i>=0&&i<PAGES.length)go(PAGES[i].id);}
const prevBtn=document.getElementById("prevBtn"),nextBtn=document.getElementById("nextBtn");
const prevMini=document.getElementById("prevMini"),nextMini=document.getElementById("nextMini");
prevBtn.onclick=prevMini.onclick=()=>step(-1);
nextBtn.onclick=nextMini.onclick=()=>step(1);
document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")step(-1);if(e.key==="ArrowRight")step(1);});

function markVisited(id){let v=get("visited",[]);if(!v.includes(id)){v.push(id);set("visited",v);}}
function updateProgress(){const v=get("visited",[]);document.querySelector("#topbar i").style.width=Math.round(v.length/PAGES.length*100)+"%";}
function updateToc(id){const v=get("visited",[]);tocList.querySelectorAll("a").forEach(a=>{a.classList.toggle("active",a.dataset.id===id);a.classList.toggle("done",v.includes(a.dataset.id));});}

/* sumário open/close */
const toc=document.getElementById("toc");
function openToc(){toc.classList.add("open");}
function closeToc(){toc.classList.remove("open");}
document.getElementById("tocOpen").onclick=openToc;
document.getElementById("tocClose").onclick=closeToc;
toc.addEventListener("click",e=>{if(e.target===toc)closeToc();});

/* =================== CHECKLISTS =================== */
function initChecklists(){
  document.querySelectorAll("ul.check").forEach(ul=>{
    const key=ul.dataset.ck,state=get(key,{});
    ul.querySelectorAll("li").forEach(li=>{
      const i=li.dataset.i;
      if(state[i]){li.classList.add("on");li.querySelector(".box").innerHTML="✓";}
      li.addEventListener("click",()=>{const on=li.classList.toggle("on");li.querySelector(".box").innerHTML=on?"✓":"";const s=get(key,{});s[i]=on;set(key,s);});
    });
  });
}
/* =================== CAMPOS =================== */
function initFields(){
  document.querySelectorAll("[data-fld]").forEach(el=>{
    const k=el.dataset.fld; if(get(k)!==undefined)el.value=get(k);
    el.addEventListener("input",()=>{set(k,el.value);const n=el.closest(".card")?.querySelector(".saved-note");if(n){n.classList.add("show");clearTimeout(n._t);n._t=setTimeout(()=>n.classList.remove("show"),1200);}});
  });
}
/* =================== QUIZ =================== */
function buildQuiz(elId,key,data){
  const wrap=document.getElementById(elId);if(!wrap)return;const saved=get(key,{});
  data.forEach((item,i)=>{
    const q=document.createElement("div");q.className="q";
    q.innerHTML=`<p class="qt">${i+1}. ${item.q}</p><div class="opts"><div class="opt" data-v="true">Verdadeiro</div><div class="opt" data-v="false">Falso</div></div><div class="fb"></div>`;
    wrap.appendChild(q);const fb=q.querySelector(".fb");
    function answer(v){q.querySelectorAll(".opt").forEach(o=>o.classList.toggle("sel",o.dataset.v===String(v)));const ok=(v===item.a);fb.className="fb show "+(ok?"ok":"no");fb.textContent=(ok?"✓ Isso mesmo. ":"✗ Não é bem assim. ")+item.e;const s=get(key,{});s[i]=v;set(key,s);showScore();}
    q.querySelectorAll(".opt").forEach(o=>o.addEventListener("click",()=>answer(o.dataset.v==="true")));
    if(saved[i]!==undefined)answer(saved[i]);
  });
  const sc=document.createElement("div");sc.className="quiz-score";wrap.appendChild(sc);
  function showScore(){const s=get(key,{});if(Object.keys(s).length<data.length)return;let ok=0;data.forEach((it,i)=>{if(s[i]===it.a)ok++;});sc.classList.add("show");sc.textContent=`Você acertou ${ok} de ${data.length}! ${ok===data.length?"Perfeito 🌸":"Reveja o conteúdo e tente de novo."}`;}
  showScore();
}
/* =================== ÁGUA =================== */
function todayKey(){const d=new Date();return "water_"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function renderCups(){
  const wrap=document.getElementById("cups");if(!wrap)return;
  const filled=get(todayKey(),0);wrap.innerHTML="";
  for(let i=0;i<10;i++){const on=i<filled;const span=document.createElement("span");span.innerHTML=ICON.cup(on);span.style.cursor="pointer";span.addEventListener("click",()=>{set(todayKey(),(i+1===filled)?i:i+1);renderCups();});wrap.appendChild(span);}
  document.getElementById("waterTot").textContent=(filled*250)+" ml";
}
function resetWater(){set(todayKey(),0);renderCups();}
function calcAgua(){const p=parseFloat(document.getElementById("pesoAgua").value);const el=document.getElementById("metaAgua");if(!p||p<=0){el.textContent="Informe um peso válido.";return;}const ml=Math.round(p*35);el.textContent=`Sua meta: ~${(ml/1000).toFixed(1)} L por dia (cerca de ${Math.round(ml/250)} copos).`;set("pesoAgua",p);}
/* =================== RECEITAS =================== */
const RLABEL={cafe:"Café da manhã",lanche:"Lanche",almoco:"Almoço",jantar:"Jantar leve",nausea:"Dia de náusea"};
function renderRecipes(f="all"){
  const wrap=document.getElementById("recipes");if(!wrap)return;wrap.innerHTML="";
  RECIPES.filter(r=>f==="all"||r.c===f).forEach(r=>{
    wrap.insertAdjacentHTML("beforeend",`<div class="recipe"><div class="rh"><div class="tag">${RLABEL[r.c]}</div><h4>${r.n}</h4><span class="prot">${ICON.muscle.replace('width="22" height="22"','width="13" height="13"')} ${r.p} de proteína</span></div><div class="rb"><h5>Ingredientes</h5><ul>${r.ing.map(x=>`<li>${x}</li>`).join("")}</ul><h5>Modo de preparo</h5><p>${r.mp}</p></div></div>`);
  });
}
function initRecipeFilter(){const f=document.getElementById("rfilter");if(!f)return;f.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{f.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));c.classList.add("on");renderRecipes(c.dataset.f);}));}

/* =================== INIT =================== */
document.addEventListener("click",e=>{if(e.target&&e.target.id==="resetBtn"){if(confirm("Isso vai apagar todas as suas anotações, checklists e progresso salvos neste aparelho. Continuar?")){localStorage.removeItem(KEY);location.reload();}}});
initChecklists();initFields();buildQuiz("quiz1","q1",QUIZ1);renderRecipes();initRecipeFilter();renderCups();
if(get("pesoAgua")){document.getElementById("pesoAgua").value=get("pesoAgua");calcAgua();}
go(get("last","capa"));
</script>
